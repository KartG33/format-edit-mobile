<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="PWA-приложение для быстрой очистки и форматирования текста. Работает офлайн.">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="E-dit">
  <title>E-dit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geologica:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --s1: #111827;
      --s2: #1a2235;
      --s3: #1e2d47;
      --b1: #1f3054;
      --b2: #2a4070;
      --accent: #3b82f6;
      --accent-d: #2563eb;
      --indigo: #6366f1;
      --text: #c9d8f0;
      --dim: #6b8aad;
      --muted: #3d5475;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --sans: 'Geologica', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      touch-action: manipulation;
    }

    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: var(--vh, 100vh);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: var(--bg);
      color: #fff;
      font-family: 'Geologica', sans-serif;
      contain: strict;
    }

    /* ── HEADER ─────────────────────────── */
    .hdr {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--b1);
      padding: 10px 14px;
      padding-top: calc(10px + var(--safe-t));
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: all .2s ease;
    }

    /* Схлопнутое состояние — когда фокус в полях замены */
    body.rp-focused .hdr {
      padding-top: calc(6px + var(--safe-t));
      padding-bottom: 6px;
      gap: 6px;
    }

    body.rp-focused .hdr-top {
      display: none;
    }

    body.rp-focused .fmt-cats {
      display: none;
    }

    body.rp-focused .fmt-btns {
      display: none;
    }

    .hdr-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--indigo));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.35);
    }

    .install-btn {
      margin-left: auto;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 7px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      text-transform: uppercase;
    }

    .install-btn.visible {
      display: flex;
    }

    .install-btn:active {
      background: rgba(59, 130, 246, 0.25);
    }

    .file-hdr-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 7px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
    }

    .file-hdr-btn:active {
      background: var(--s3);
      color: var(--text);
    }

    .stats-row {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .chip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 5px;
      padding: 2px 8px;
    }

    .chip b {
      color: var(--dim);
      font-weight: 500;
    }

    /* FORMAT — категории + кнопки */
    .fmt-cats {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .fmt-cats::-webkit-scrollbar {
      display: none;
    }

    .fmt-cat {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--b1);
      background: var(--s2);
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .fmt-cat.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .fmt-cat:active {
      opacity: .8;
    }

    .fmt-btns {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 1px;
    }

    .fmt-btns::-webkit-scrollbar {
      display: none;
    }

    .f-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 9px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
      min-height: 38px;
    }

    .f-btn:active {
      background: var(--s3);
      border-color: var(--b2);
      color: var(--text);
      transform: scale(.97);
    }

    /* ── SYMBOLS ─────────────────────────── */
    .sym-bar {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--b1);
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sym-head {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }

    .sym-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--dim);
    }

    /* Tab switcher — full width */
    .sym-tabs {
      display: flex;
      gap: 0;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 3px;
      width: 100%;
    }

    .sym-tab {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em;
    }

    .sym-tab.active {
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
    }

    .sym-tab:active {
      opacity: .8;
    }

    .sym-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      min-height: 34px;
      align-items: center;
    }

    .sym-scroll::-webkit-scrollbar {
      display: none;
    }

    .s-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 7px;
      background: var(--s2);
      border: 1px solid var(--b2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
      transition: all .12s;
    }

    .s-btn:active {
      transform: scale(.93);
    }

    .s-btn.gone {
      text-decoration: line-through;
      color: var(--muted);
      border-color: var(--b1);
      background: var(--s1);
      opacity: .6;
    }

    .s-btn.gone:active {
      border-color: rgba(34, 197, 94, .4);
      color: var(--green);
      opacity: 1;
    }

    .s-btn.emoji-btn {
      font-size: 16px;
    }

    .s-n {
      font-size: 9px;
      color: var(--muted);
      background: var(--s3);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: var(--mono);
    }

    .sym-empty {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── REPLACE PANEL ───────────────────── */
    .replace-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .replace-panel.active {
      display: flex;
    }

    .rp-field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
    }

    .rp-field input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      width: 100%;
      caret-color: var(--accent);
    }

    .rp-field input::placeholder {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--sans);
    }

    .rp-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      white-space: nowrap;
      width: 28px;
      flex-shrink: 0;
    }

    .rp-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .rp-pair-hint {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity .2s;
      padding: 0 2px;
    }

    .rp-pair-hint.visible {
      opacity: 1;
    }

    .rp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 0;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      transition: all .12s;
    }

    .rp-btn:active {
      background: var(--accent-d);
      transform: scale(.98);
    }

    .rp-btn.clear-btn {
      background: transparent;
      border: 1px solid var(--b2);
      color: var(--dim);
      flex: 0 0 44px;
      font-size: 18px;
      padding: 11px 0;
    }

    .rp-btn.clear-btn:active {
      background: var(--s3);
    }

    /* ── CONTENT ROW ────────────────────── */
    .content-row {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-col {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Sidebar — скрыт на мобайле */
    .notes-sidebar {
      display: none;
    }

    /* ── EDITOR ─────────────────────────── */
    .editor-wrap {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      height: 0;
    }

    textarea {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: var(--s2);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.55;
      padding: 10px 12px;
      caret-color: var(--accent);
      -webkit-appearance: none;
      user-select: text;
      -webkit-user-select: text;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      contain: layout style paint;
    }

    textarea::placeholder {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
    }

    /* Diff pill */
    .diff-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(11, 15, 26, .88);
      border: 1px solid var(--b2);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      pointer-events: none;
      display: none;
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .diff-pill.pos {
      color: #4ade80;
      border-color: rgba(74, 222, 128, .3);
    }

    .diff-pill.neg {
      color: #f87171;
      border-color: rgba(248, 113, 113, .3);
    }

    /* File mode banner */
    .file-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(59, 130, 246, .1);
      border-bottom: 1px solid rgba(59, 130, 246, .25);
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
      contain: content;
    }

    .file-banner.active {
      display: flex;
    }

    .file-name {
      font-family: var(--mono);
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-close {
      cursor: pointer;
      opacity: .6;
      font-size: 16px;
      line-height: 1;
    }

    .file-close:hover {
      opacity: 1;
    }

    /* ── BOTTOM BAR ─────────────────────── */
    .btm {
      flex-shrink: 0;
      background: var(--s1);
      border-top: 1px solid var(--b1);
      padding: 8px 10px;
      padding-bottom: calc(8px + var(--safe-b));
      display: grid;
      grid-template-columns: 1fr 1fr 1.6fr 1.6fr 1fr;
      gap: 6px;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, .35);
    }

    .b-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 11px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .12s;
      min-height: 56px;
    }

    .b-btn:active {
      transform: scale(.94);
    }

    .b-btn.green {
      color: #4ade80;
      border-color: rgba(74, 222, 128, .25);
    }

    .b-btn.green:active {
      background: rgba(34, 197, 94, .1);
    }

    .b-btn.blue {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(59, 130, 246, .35);
    }

    .b-btn.blue:active {
      background: var(--accent-d);
    }

    .b-btn.red {
      color: #f87171;
      border-color: rgba(239, 68, 68, .25);
    }

    .b-btn.red:active {
      background: rgba(239, 68, 68, .1);
    }

    /* FILE MENU */
    .file-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b2);
      border-radius: 20px 20px 0 0;
      padding: 16px 16px;
      padding-bottom: calc(20px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32, 1.2, .64, 1);
      z-index: 50;
      box-shadow: 0 -20px 60px rgba(0, 0, 0, .5);
    }

    .file-menu.open {
      transform: translateY(0);
    }

    .fm-handle {
      width: 40px;
      height: 4px;
      background: var(--b2);
      border-radius: 2px;
      margin: 0 auto 10px;
    }

    .fm-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 0 4px;
    }

    .fm-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
      text-align: left;
    }

    .fm-btn:active {
      background: var(--s3);
    }

    .fm-btn .fm-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .fm-btn .fm-sub {
      font-size: 11px;
      color: var(--dim);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .fm-btn.open-f .fm-icon {
      background: rgba(59, 130, 246, .2);
      color: var(--accent);
    }

    .fm-btn.save-f .fm-icon {
      background: rgba(34, 197, 94, .15);
      color: var(--green);
    }

    .fm-btn.paste-f .fm-icon {
      background: rgba(245, 158, 11, .12);
      color: var(--yellow);
    }

    .fm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .fm-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
      padding: 9px 20px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: all .28s cubic-bezier(.34, 1.56, .64, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* OFFLINE INDICATOR - hidden */
    .offline-dot {
      display: none;
    }

    /* ── NOTES SHEET ─────────────────────── */
    .notes-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b2);
      border-radius: 20px 20px 0 0;
      padding: 16px 16px;
      padding-bottom: calc(20px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32, 1.2, .64, 1);
      z-index: 50;
      box-shadow: 0 -20px 60px rgba(0,0,0,.5);
      max-height: 82dvh;
    }
    .notes-menu.open { transform: translateY(0); }

    .nm-tabs {
      display: flex;
      gap: 0;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 3px;
    }
    .nm-tab {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .nm-tab.active {
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
    }

    .nm-save-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .nm-save-input {
      flex: 1;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 10px;
      padding: 10px 14px;
      color: va
